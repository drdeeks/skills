# Crew Model Map — Multi-Agent Phase Orchestration
#
# FOREVER SYSTEM §6: Crew orchestration layer. The enforcer coordinates
# agent-model-map.yaml files across the crew, affirmatively reminding
# each agent its phase-specific model assignments.
#
# Layer: crew-model-map-v1
# Supersedes: none
# Generated by: interactive_setup.py
# Crew: prod-trading
# Mode: production

crew_id: "prod-trading"
crew_mode: "production"  # development | production

# Agent roster with phase assignments
# Each agent references its own agent-model-map.yaml (not duplicated here)
agents:
  - agent_id: "lead-x1y2"
    agent_type: "lead"
    model_map: "../agents/lead-x1y2/agent-model-map.yaml"
    phases: ["PHASE-0", "PHASE-5"]
    scope: "phase-owner"
    responsibilities:
      - "Creative vision synthesis"
      - "Final holistic review"
      - "Prompt optimization"
      - "Deployment orchestration"
  
  - agent_id: "narrative-architect"
    agent_type: "narrative"
    model_map: "../agents/narrative-architect/agent-model-map.yaml"
    phases: ["PHASE-0", "PHASE-1"]
    scope: "phase-owner"
    responsibilities:
      - "Story structure & beats"
      - "Character arc design"
  
  - agent_id: "screenwriter"
    agent_type: "writer"
    model_map: "../agents/screenwriter/agent-model-map.yaml"
    phases: ["PHASE-1", "PHASE-2"]
    scope: "module"
    modules: ["MOD-001", "MOD-002"]
    responsibilities:
      - "Dialogue & scene writing"
      - "Format compliance"
  
  - agent_id: "storyboard-artist"
    agent_type: "visual"
    model_map: "../agents/storyboard-artist/agent-model-map.yaml"
    phases: ["PHASE-2", "PHASE-3"]
    scope: "module"
    modules: ["MOD-003", "MOD-004"]
    responsibilities:
      - "Visual composition"
      - "Shot design"
      - "Style consistency"
  
  - agent_id: "cinematographer"
    agent_type: "visual"
    model_map: "../agents/cinematographer/agent-model-map.yaml"
    phases: ["PHASE-2", "PHASE-3"]
    scope: "module"
    modules: ["MOD-005"]
    responsibilities:
      - "Reference analysis"
      - "Lighting & camera specs"
  
  - agent_id: "prompt-composer"
    agent_type: "ai-integration"
    model_map: "../agents/prompt-composer/agent-model-map.yaml"
    phases: ["PHASE-2", "PHASE-3"]
    scope: "module"
    modules: ["MOD-006"]
    responsibilities:
      - "Prompt engineering"
      - "Parameter optimization"
  
  - agent_id: "generation-engine"
    agent_type: "backend"
    model_map: "../agents/generation-engine/agent-model-map.yaml"
    phases: ["PHASE-3"]
    scope: "phase-owner"
    responsibilities:
      - "Video generation (Wan)"
      - "Image generation"
      - "Voice synthesis"
  
  - agent_id: "quality-reviewer"
    agent_type: "qa"
    model_map: "../agents/quality-reviewer/agent-model-map.yaml"
    phases: ["PHASE-4"]
    scope: "phase-owner"
    responsibilities:
      - "Visual quality scoring"
      - "Composition analysis"
      - "Gate decisions"
  
  - agent_id: "director"
    agent_type: "lead"
    model_map: "../agents/director/agent-model-map.yaml"
    phases: ["PHASE-4", "PHASE-5"]
    scope: "phase-owner"
    responsibilities:
      - "Final approval"
      - "Assembly check"
      - "Release decision"
  
  - agent_id: "assembly-engine"
    agent_type: "backend"
    model_map: "../agents/assembly-engine/agent-model-map.yaml"
    phases: ["PHASE-5"]
    scope: "phase-owner"
    responsibilities:
      - "Final assembly"
      - "Format compliance"
      - "Delivery preparation"

# Shared model pool (cost optimization — limits concurrent expensive models)
shared_model_pool:
  maximum_reasoning:
    model: "qwen3-max"
    max_concurrent: 1
    queue_strategy: "block"  # block | queue | spill_to_strong
  strong_reasoning:
    model: "qwen3.5-plus"
    max_concurrent: 2
    queue_strategy: "queue"
  vision_high:
    model: "qwen3-vl-plus"
    max_concurrent: 1
    queue_strategy: "block"
  fast_iteration:
    model: "qwen3.5-flash"
    max_concurrent: "unlimited"
    queue_strategy: "none"
  vision_fast:
    model: "qwen3-vl-flash"
    max_concurrent: "unlimited"
    queue_strategy: "none"

# Phase gate synchronization
# All agents in a phase must complete before phase advances
phase_gates:
  "PHASE-0":
    required_agents: ["lead-x1y2", "narrative-architect"]
    gate_type: "all_complete"
  "PHASE-1":
    required_agents: ["lead-x1y2", "narrative-architect", "screenwriter"]
    gate_type: "all_complete"
  "PHASE-2":
    required_agents: ["screenwriter", "storyboard-artist", "cinematographer", "prompt-composer"]
    gate_type: "all_complete"
  "PHASE-3":
    required_agents: ["generation-engine"]
    gate_type: "all_complete"
  "PHASE-4":
    required_agents: ["quality-reviewer", "director"]
    gate_type: "all_complete"
  "PHASE-5":
    required_agents: ["director", "assembly-engine"]
    gate_type: "all_complete"

# Cross-agent communication protocol
communication:
  broadcast_channel: "crew-broadcast"
  direct_channels: true
  thread_tracking: true
  message_format: "crew-knowledge-system"  # references crew-knowledge-system skill

# Token budget (crew-level aggregation)
token_budget:
  total_estimate: 151500
  alert_threshold: 0.75
  hard_limit: 1.0
  per_agent:
    lead-x1y2: 10000
    narrative-architect: 8000
    screenwriter: 15000
    storyboard-artist: 12000
    cinematographer: 8000
    prompt-composer: 10000
    generation-engine: 50000
    quality-reviewer: 15000
    director: 8000
    assembly-engine: 5000

# Layer metadata (Forever §3)
_layer:
