# Phase → Model assignments (THE character reminder)
# create = initial work, revise = iteration loops
phase_model_map:
  "PHASE-0":  # Foundation
    create: "strong_reasoning"
    revise: "fast_iteration"
  "PHASE-1":  # Architecture
    create: "maximum_reasoning"
    revise: "strong_reasoning"
  "PHASE-2":  # Implementation
    create: "strong_reasoning"
    revise: "fast_iteration"
  "PHASE-3":  # Integration
    create: "strong_reasoning"
    revise: "fast_iteration"
  "PHASE-4":  # Quality
    evaluate: "vision_high"
    quick_check: "vision_fast"
  "PHASE-5":  # Deployment
    assemble: "fast_iteration"

# Task-specific overrides (optional)
task_overrides:
  "screen-specs":
    create: "vision_high"
    revise: "vision_fast"
  "video-generation":
    iteration: "video_iteration"
    final: "video_final"
  "storyboard-creation":
    iteration: "image_iteration"
    final: "image_final"
  "voice-recording":
    iteration: "voice_iteration"
    final: "voice_final"

# Token reduction strategies (affirmative reminders §6)
strategies:
  - "Flash-first iteration: always generate with flash models first. Only upgrade to quality after evaluation passes."
  - "Retrieve don't remember: use semantic search to retrieve only relevant context. Never load full project."
  - "Working memory isolation: load only own input artifacts, not the entire project."
  - "Regenerate only failure: when Quality Reviewer fails a scene, only that scene regenerates."
  - "Thinking mode off by default: enable thinking only for creative vision and final review."
  - "Context caching: cache Creative Brief in context for repeated reference across all agents."
  - "Batch API for offline work: use Batch API (50% off) for non-realtime generation like bulk storyboard renders."
  - "Short clips first: generate 2-3 second flash clips for motion validation before committing to 5-10 second quality renders."

# Token budget (per agent)
token_budget:
  total_estimate: 25000
  alert_threshold: 0.75
  hard_limit: 1.0

